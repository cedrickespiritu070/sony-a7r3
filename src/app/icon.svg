<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background tile -->
  <rect width="32" height="32" rx="7" fill="#0c0c0c"/>

  <!-- Lens mount collar — subtle white ring -->
  <circle cx="16" cy="16" r="11"
    fill="none"
    stroke="rgba(255,255,255,0.22)"
    stroke-width="1.2"/>

  <!-- Mid ring — depth layer -->
  <circle cx="16" cy="16" r="7.5"
    fill="none"
    stroke="rgba(255,255,255,0.07)"
    stroke-width="0.8"/>

  <!-- Blue aperture ring — brand accent -->
  <circle cx="16" cy="16" r="5.5"
    fill="none"
    stroke="#2b8dff"
    stroke-width="2"/>

  <!-- Inner glass fill — very subtle blue tint -->
  <circle cx="16" cy="16" r="3.5"
    fill="rgba(43,141,255,0.12)"/>

  <!-- Center dot — lens pupil -->
  <circle cx="16" cy="16" r="1.8"
    fill="#2b8dff"/>

  <!-- Glare highlight — top-left lens reflection -->
  <ellipse cx="13.2" cy="13.4" rx="1.4" ry="0.8"
    fill="rgba(255,255,255,0.09)"
    transform="rotate(-35 13.2 13.4)"/>
</svg>
